<html lang="zh-Hant"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>台新-西松 漲停打開/跌停打開 統計</title>
<style>
:root{--bg:#f5f5f4;--card:#fff;--line:#e3e3df;--txt:#1c1c1a;--mut:#6b6b66;--hint:#9a9a93;

@media(prefers-color-scheme:dark){:root{--bg:#1a1a18;--card:#242422;--line:#36352f;--txt:#ececea;
--mut:#a3a39c;--hint:#74746d;--pos:#ff6b5e;--posbg:#3a1f1c;--neg:#4cc878;--negbg:#16301f;--accent:#7fa0e0;--accbg:#222a3a;}}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,"Segoe UI","Microsoft JhengHei",sans-serif;line-height:1.55;}
.wrap{max-width:880px;margin:0 auto;padding:18px 16px 60px;}
.head{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:10px;margin-bottom:8px;}
.h-name{font-size:21px;font-weight:600;}.h-code{font-size:14px;color:var(--hint);font-weight:400;margin-left:6px;}
.h-sub{font-size:13px;color:var(--mut);margin-top:2px;}
select{font-size:14px;padding:7px 10px;border:1px solid var(--line);border-radius:8px;background:var(--card);color:var(--txt);}
.pbtns{display:flex;gap:6px;margin:2px 0 6px;}
.pbtn{font-size:13px;padding:6px 16px;border:1px solid var(--line);border-radius:8px;background:var(--card);color:var(--mut);cursor:pointer;}
.pbtn:hover{border-color:var(--accent);color:var(--txt);}
.pbtn.on{background:var(--accbg);border-color:var(--accent);color:var(--accent);font-weight:600;}
.range{font-size:12.5px;color:var(--mut);margin:6px 0 0;}.range b{color:var(--txt);}
.sect{font-size:13px;font-weight:600;color:var(--mut);margin:20px 0 8px;letter-spacing:.03em;}
.sect-row{display:flex;justify-content:space-between;align-items:flex-end;margin:24px 0 6px;gap:10px;}
.sect-row .sect{margin:0;}
.hint{font-size:11.5px;color:var(--hint);margin:0 2px 8px;}
.stat2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:600px){.stat2{grid-template-columns:1fr;}}
.sc{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 15px;}
.sc-h{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.tag{font-size:12.5px;font-weight:600;padding:3px 11px;border-radius:8px;}
.tag.up{background:var(--negbg);color:var(--neg);}.tag.dn{background:var(--posbg);color:var(--pos);}
.sc-sub{font-size:11.5px;color:var(--hint);}
.sg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px 8px;}
.sg .lab{font-size:11px;color:var(--mut);}.sg .val{font-size:17px;font-weight:600;margin-top:1px;}
.sg .val s{font-size:12px;color:var(--hint);font-weight:400;text-decoration:none;margin-left:3px;}
.curvebox{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 12px 4px;}
.cv{fill:none;stroke:var(--accent);stroke-width:2;}
.bar-up{fill:var(--pos);cursor:pointer;}.bar-dn{fill:var(--neg);cursor:pointer;}
.bar-up:hover,.bar-dn:hover{opacity:0.65;}
.sel-line{stroke:var(--accent);stroke-width:1.5;opacity:0.55;}.sel-tri{fill:var(--accent);}
.zero{stroke:var(--line);stroke-dasharray:4 4;stroke-width:1;}
circle.mku{fill:var(--pos);cursor:pointer;}circle.mkd{fill:var(--neg);cursor:pointer;}
text.lblu{fill:var(--pos);font-size:10.5px;font-weight:500;}text.lbld{fill:var(--neg);font-size:10.5px;font-weight:500;}
text.endl{fill:var(--mut);font-size:11px;font-weight:600;}text.axl{fill:var(--hint);font-size:10.5px;}
.cap{font-size:11.5px;color:var(--hint);margin:6px 2px 0;}
.lead2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:600px){.lead2{grid-template-columns:1fr;}}
table{width:100%;border-collapse:collapse;font-size:12.5px;background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden;}
th,td{padding:6px 9px;text-align:right;border-bottom:1px solid var(--line);}
th{font-size:11px;color:var(--mut);font-weight:500;background:var(--bg);}
td.l,th.l{text-align:left;}tr:last-child td{border-bottom:none;}
.row{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:9px 12px;background:var(--card);
border:1px solid var(--line);border-radius:9px;margin-bottom:6px;}
.row .nm{font-weight:600;min-width:96px;font-size:14px;}.row .nm s{color:var(--hint);font-size:12px;font-weight:400;text-decoration:none;margin-left:4px;}
.row .mid{flex:1;font-size:12.5px;color:var(--mut);text-align:center;}
.row .pl{font-weight:600;min-width:64px;text-align:right;font-size:14px;}
.daysum{font-size:12.5px;color:var(--mut);margin:0 0 6px;}.daysum b{color:var(--txt);}
.pos{color:var(--pos);}.neg{color:var(--neg);}
.lock{font-size:11px;padding:1px 6px;border-radius:5px;background:var(--bg);color:var(--mut);margin-left:4px;}
.lock-g{background:var(--negbg);color:var(--neg);}.lock-r{background:var(--posbg);color:var(--pos);}
.lk-stk{cursor:pointer;}.lk-stk:hover td{background:var(--accbg);}
.ring{fill:none;stroke:var(--accent);stroke-width:2;cursor:pointer;}
.focusbar{display:flex;justify-content:space-between;align-items:center;gap:10px;background:var(--accbg);
border:1px solid var(--accent);border-radius:9px;padding:8px 12px;margin:0 0 8px;font-size:12.5px;color:var(--txt);}
.focusbar button{font-size:12px;padding:3px 12px;border:1px solid var(--accent);border-radius:7px;background:var(--card);color:var(--accent);cursor:pointer;white-space:nowrap;}
.foot{font-size:11.5px;color:var(--hint);margin-top:24px;border-top:1px solid var(--line);padding-top:12px;}
.empty{font-size:13px;color:var(--hint);padding:8px 2px;}
#titan-scene{position:fixed;right:26px;bottom:20px;width:190px;height:80px;z-index:60;pointer-events:none;font-family:sans-serif;opacity:0;transform:scale(.9);transform-origin:bottom right;transition:opacity .25s ease,transform .25s ease;}
#titan-scene.show{opacity:1;transform:scale(1.15);}
.ts-fig{position:absolute;left:0;bottom:0;width:46px;height:60px;animation:ts-lunge .85s ease-in-out infinite;}
@keyframes ts-lunge{0%,42%{transform:translateX(0);}56%{transform:translateX(11px);}72%,100%{transform:translateX(0);}}
.ts-fig .arm-p,.ts-fig .leg,.ts-fig .leg2{transform-box:fill-box;transform-origin:center top;}
.ts-fig .arm-p{animation:ts-punch .85s ease-in-out infinite;}
@keyframes ts-punch{0%,42%{transform:rotate(-22deg);}56%{transform:rotate(82deg);}72%,100%{transform:rotate(-22deg);}}
.ts-fig .leg{transform:rotate(9deg);}.ts-fig .leg2{transform:rotate(-9deg);}
.ts-board{position:absolute;left:54px;bottom:6px;width:30px;height:46px;border-radius:5px;color:#fff;font-weight:700;font-size:12px;
  writing-mode:vertical-rl;letter-spacing:2px;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(#ff5b5b,#e23b3b);box-shadow:inset 0 0 0 2px #b32020,0 2px 4px rgba(0,0,0,.2);
  animation:ts-hit .85s ease-in-out infinite;}
@keyframes ts-hit{0%,48%{transform:translateX(0) rotate(0);filter:brightness(1);}58%{transform:translateX(8px) rotate(5deg);filter:brightness(1.35);}74%,100%{transform:translateX(0) rotate(0);filter:brightness(1);}}
.ts-dmg{position:absolute;color:#17a44b;font-weight:800;font-size:13px;opacity:0;text-shadow:0 1px 2px rgba(0,0,0,.18);animation:ts-dmg 1.7s ease-out infinite;}
@keyframes ts-dmg{0%{opacity:0;transform:translate(0,0) scale(.5);}10%{opacity:1;transform:translate(2px,-5px) scale(1.15);}100%{opacity:0;transform:translate(var(--dx,24px),-48px) scale(.85);}}
@media(prefers-reduced-motion:reduce){#titan-scene{display:none;}}
</style></head>

function aggregate(days){
  function stat(key){
    const plays=[]; const dset=new Set();
    days.forEach(d=>{ if(d[key].length) dset.add(d.date); d[key].forEach(r=>plays.push(r)); });
    const n=plays.length, wins=plays.filter(r=>r.pnl>0).length, broke=plays.filter(r=>r.opened).length;
    const pnl=Math.round(plays.reduce((a,r)=>a+r.pnl,0)*10)/10;
    const m={};
    plays.forEach(r=>{const a=m[r.code]||(m[r.code]={code:r.code,name:r.name,count:0,pnl:0,broke:0});
      a.count++; a.pnl+=r.pnl; a.broke+=r.opened?1:0;});
    const recur=Object.values(m).map(a=>({...a,pnl:Math.round(a.pnl*10)/10}))
      .sort((x,y)=> y.count-x.count || Math.abs(y.pnl)-Math.abs(x.pnl)).slice(0,10);
    return {days:dset.size, plays:n, avg_day:days.length?Math.round(n/days.length*10)/10:0,
      win_rate:n?Math.round(wins/n*100):0, pnl, pnl_avg:n?Math.round(pnl/n*10)/10:0,
      broke_rate:n?Math.round(broke/n*100):0, recur};
  }
  return {n_days:days.length, date_from:days.length?days[0].date:'', date_to:days.length?days[days.length-1].date:'',
    up:stat('open_up'), dn:stat('open_dn')};
}

function statCard(tagcls,title,sub,s){
  const cells=[['出現天數',`${s.days}/${s_ndays}`],['檔次',`${s.plays}<s>${s.avg_day}/天</s>`],
    ['勝率',`${s.win_rate}%`],['敲開率',`${s.broke_rate}%`],
    ['累計損益',`<span class="${cls(s.pnl)}">${wan0(s.pnl)}</span>`],['平均每檔',`<span class="${cls(s.pnl_avg)}">${wan(s.pnl_avg)}</span>`]];
  return `<div class="sc${tagcls==='up'?' up-hot':''}"><div class="sc-h"><span class="tag ${tagcls}">${title}</span><span class="sc-sub">${sub}</span></div>`+
    `<div class="sg">`+cells.map(c=>`<div><div class="lab">${c[0]}</div><div class="val">${c[1]}</div></div>`).join('')+`</div></div>`;
}

function renderLeaders(agg){
  document.getElementById('lead2').innerHTML=
    leadTable('漲停打開','up',agg.up.recur)+leadTable('跌停打開','dn',agg.dn.recur);
}

function renderBars(days){
  const el=document.getElementById('curve');
  if(!days.length){el.innerHTML='<div class="empty">（無資料）</div>';document.getElementById('curvecap').textContent='';return;}
  const ser=days.map(d=>({date:d.date, v:Math.round((d.pnl_up+d.pnl_dn)*10)/10}));
  const cum=Math.round(ser.reduce((a,s)=>a+s.v,0));
  const W=860,H=210,padL=14,padR=14,padT=22,padB=24,n=ser.length;
  const top=padT, hh=H-padT-padB;
  let vmax=Math.max(0,...ser.map(s=>s.v)), vmin=Math.min(0,...ser.map(s=>s.v));
  if(vmax===vmin){vmax+=1;vmin-=1;}
  const span=vmax-vmin, Y=v=> top+hh*((vmax-v)/span), y0=Y(0);
  const slot=(W-padL-padR)/n, bw=Math.max(1, Math.min(slot*0.8, 22));
  const ext=ser.map((s,i)=>({...s,i})).filter(s=>Math.abs(s.v)>=500).sort((a,b)=>Math.abs(b.v)-Math.abs(a.v)).slice(0,8);
  const extSet=new Set(ext.map(s=>s.i));
  const md=s=>(+s.date.slice(4,6))+'/'+(+s.date.slice(6));
  let bars='';
  ser.forEach((s,i)=>{
    const cx=padL+slot*i+slot/2, x=cx-bw/2, yv=Y(s.v);
    const by=Math.min(yv,y0), bh=Math.max(1.5,Math.abs(yv-y0)), up=s.v>=0;
    const foc=focusCode && inDay(days[i],focusCode);
    const op=(focusCode && !foc)?' opacity="0.14"':'';
    bars+=`<rect x="${x.toFixed(1)}" y="${by.toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}" class="${up?'bar-up':'bar-dn'}"${op} onclick="renderDay('${s.date}')"><title>${md(s)}　${wan(s.v)}（點選看當日）</title></rect>`;
    if(extSet.has(i)||foc){                                   // 爆賺/爆賠或聚焦日：給寬點擊區，細柱也好點
      const hw=Math.max(bw,14), hx=cx-hw/2;
      bars+=`<rect x="${hx.toFixed(1)}" y="${top}" width="${hw.toFixed(1)}" height="${hh.toFixed(1)}" fill="transparent" style="cursor:pointer" onclick="renderDay('${s.date}')"><title>${md(s)}　${wan(s.v)}</title></rect>`;
    }
  });
  let lbl='';
  ext.forEach(s=>{const cx=padL+slot*s.i+slot/2, up=s.v>=0, ly=up?Y(s.v)-5:Y(s.v)+13, lx=Math.min(Math.max(cx,34),W-34);
    const op=(focusCode && !inDay(days[s.i],focusCode))?' opacity="0.18"':'';
    lbl+=`<text x="${lx.toFixed(1)}" y="${ly.toFixed(1)}" class="${up?'lblu':'lbld'}"${op} text-anchor="middle" style="cursor:pointer" onclick="renderDay('${s.date}')">${md(s)} ${wan0(s.v)}</text>`;});
  let guide='';
  const si=days.findIndex(d=>d.date===selDate);
  if(si>=0){const gx=padL+slot*si+slot/2;
    guide=`<line x1="${gx.toFixed(1)}" y1="${top}" x2="${gx.toFixed(1)}" y2="${(H-padB).toFixed(1)}" class="sel-line"/>`+
      `<path d="M${(gx-5).toFixed(1)} ${(top-8).toFixed(1)} L${(gx+5).toFixed(1)} ${(top-8).toFixed(1)} L${gx.toFixed(1)} ${(top-1).toFixed(1)} Z" class="sel-tri"/>`;}
  el.innerHTML=`<svg viewBox="0 0 ${W} ${H}" width="100%" role="img" aria-label="每日損益柱狀圖">`+
    `<line x1="${padL}" y1="${y0.toFixed(1)}" x2="${W-padR}" y2="${y0.toFixed(1)}" class="zero"/>`+bars+lbl+guide+
    `<text x="${padL}" y="${H-6}" class="axl" text-anchor="start">${fmtD(ser[0].date).slice(5)}</text>`+
    `<text x="${W-padR}" y="${H-6}" class="axl" text-anchor="end">${fmtD(ser[n-1].date).slice(5)}</text></svg>`;
  const big=ext.length? '；最大單日：'+ext.slice(0,3).map(s=>md(s)+' '+wan0(s.v)).join('、') : '';
  document.getElementById('curvecap').innerHTML=`期間累計 <b style="color:var(--txt)">${wan0(cum)}</b>　·　每根=當日損益，最高/最低就是爆賺/爆賠日（點柱看當日）${big}`;
}

function rowsHTML(arr,kind){
  if(!arr.length) return '<div class="empty">（今日無）</div>';
  return arr.map(r=>{
    const openCls=kind==='up'?'lock-g':'lock-r';
    const lk=r.opened?`<span class="lock ${openCls}">已敲開</span>`:'<span class="lock">仍鎖死</span>';
    const rl=r.relock?'<span class="lock" style="border:1px solid var(--accent);color:var(--accent);background:transparent">隔日結算</span>':'';
    const mid=kind==='up'?`漲停 ${r.limit} · 賣 ${r.sell} / 買 ${r.buy} 張 @${r.savg}`+lk+rl
      :`跌停 ${r.limit} · 買 ${r.buy} / 賣 ${r.sell} 張 @${r.bavg} · 當沖 ${r.dt}`+lk+rl;
    return `<div class="row"><span class="nm">${r.name}<s>${r.code}</s></span>`+
      `<span class="mid">${mid}</span><span class="pl ${cls(r.pnl)}">${wan(r.pnl)}</span></div>`;
  }).join('');
}
function renderDay(date){
  const d=byDate[date]; if(!d) return; selDate=date; document.getElementById('datesel').value=date;
  document.getElementById('daysect').textContent='當日明細 · '+fmtD(date)+'（大盤 '+d.market+'）';
  document.getElementById('daysum').innerHTML=
    `周轉 <b>${d.turnover.toLocaleString()}</b> 張 · 當沖佔比 <b>${d.daytrade_pct}%</b>　｜　`+
    `漲停打開合計 <b class="${cls(d.pnl_up)}">${wan(d.pnl_up)}</b> · 跌停打開合計 <b class="${cls(d.pnl_dn)}">${wan(d.pnl_dn)}</b>`;
  document.getElementById('upc').textContent=`① 漲停打開做空 · ${d.open_up.length} 檔`;
  document.getElementById('dnc').textContent=`② 跌停打開當沖 · ${d.open_dn.length} 檔`;
  document.getElementById('openup').innerHTML=rowsHTML(d.open_up,'up');
  document.getElementById('opendn').innerHTML=rowsHTML(d.open_dn,'dn');
  if(currentDays.length) renderBars(currentDays);   // 重畫柱狀圖以更新選定日高亮
}

const sel=document.getElementById('datesel');
function setPeriod(p){
  focusCode=null; document.getElementById('focusbar').style.display='none';
  document.querySelectorAll('.pbtn').forEach(b=>b.classList.toggle('on', +b.dataset.m===p.months));
  const days=DATA.filter(d=>d.date>=p.start); currentDays=days;
  const agg=aggregate(days);
  document.getElementById('range').innerHTML=`區間 <b>${fmtD(agg.date_from)} ~ ${fmtD(agg.date_to)}</b>（${agg.n_days} 個交易日）`;
  renderStats(agg); renderLeaders(agg);
  sel.innerHTML=''; days.forEach(d=>{const o=document.createElement('option');o.value=d.date;o.textContent=fmtD(d.date);sel.appendChild(o);});
  let best=days[0], bv=-1;                                  // 預設停在單日損益最猛那天
  days.forEach(d=>{const v=Math.abs(d.pnl_up+d.pnl_dn); if(v>bv){bv=v;best=d;}});
  renderDay(best.date);                                     // renderDay 內會畫柱狀圖（含選定日高亮）
}
function focusStock(code,name){
  focusCode=(focusCode===code)?null:code;                   // 再點同一檔=取消
  const fb=document.getElementById('focusbar');
  if(!focusCode){ fb.style.display='none'; renderDay(selDate); return; }   // 取消聚焦：重畫(解除淡化)、留在目前選定日
  const appear=currentDays.filter(d=>inDay(d,code));
  const tot=currentDays.reduce((a,d)=>a+dayContrib(d,code),0);
  fb.style.display='flex';
  fb.innerHTML=`<span>聚焦 <b>${name} ${code}</b>：期間出現 <b>${appear.length}</b> 天 · 累計 <b class="${cls(tot)}">${wan0(tot)}</b> · 柱狀圖已標示（其餘淡化）</span>`+
    `<button onclick="focusStock('${code}','${name}')">取消聚焦</button>`;
  let best=null,bv=-1;
  appear.forEach(d=>{const c=Math.abs(dayContrib(d,code)); if(c>bv){bv=c;best=d;}});
  renderDay((best||{date:selDate}).date);                   // renderDay 內重畫柱狀圖(含聚焦淡化+選定日高亮)
}
const pb=document.getElementById('pbtns');
PERIODS.forEach(p=>{const b=document.createElement('button');b.className='pbtn';b.dataset.m=p.months;b.textContent=p.label;
  b.onclick=()=>setPeriod(p);pb.appendChild(b);});
document.getElementById('foot').innerHTML=
  `更新時間：${META.gen}　·　紅＝漲/賺、綠＝跌/賠`;
const _scene=document.getElementById('titan-scene');
document.addEventListener('mouseover',e=>{ if(e.target.closest && e.target.closest('.up-hot')) _scene.classList.add('show'); });
document.addEventListener('mouseout',e=>{ const h=e.target.closest&&e.target.closest('.up-hot'); if(h){ const to=e.relatedTarget; if(!to||!(to.closest&&to.closest('.up-hot'))) _scene.classList.remove('show'); } });
setPeriod(PERIODS.find(p=>p.months===META.default)||PERIODS[1]);
(function(){const hp=new URLSearchParams(location.hash.slice(1));
  const per=hp.get('period'); if(per){const p=PERIODS.find(x=>String(x.months)===per); if(p) setPeriod(p);}
  if(hp.get('smash')) document.getElementById('titan-scene').classList.add('show');
  const fc=hp.get('focus'); if(!fc)return;
  let nm=fc; for(const d of DATA){const h=d.open_up.concat(d.open_dn).find(r=>r.code===fc); if(h){nm=h.name;break;}} focusStock(fc,nm);})();
</script></body></html>
